<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: #00ff00;
            background: black;
        }
        .matrix {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }
        .matrix div {
            position: absolute;
            bottom: 100%;
            width: 20px;
            height: 100px;
            background: rgba(0, 255, 0, 0.2);
            animation: fall linear infinite;
        }
        @keyframes fall {
            to { transform: translateY(100vh); }
        }
        h1 {
            text-align: center;
            padding-top: 20px;
        }
        section {
            margin: 20px;
        }
    </style>
</head>
<body>
    <div class="matrix">
        <div style="left: 10%; animation-duration: 3s;"></div>
        <div style="left: 20%; animation-duration: 4s;"></div>
        <div style="left: 30%; animation-duration: 5s;"></div>
        <div style="left: 40%; animation-duration: 6s;"></div>
        <div style="left: 50%; animation-duration: 3.5s;"></div>
        <div style="left: 60%; animation-duration: 4.5s;"></div>
        <div style="left: 70%; animation-duration: 5.5s;"></div>
        <div style="left: 80%; animation-duration: 6.5s;"></div>
        <div style="left: 90%; animation-duration: 4s;"></div>
    </div>
    <h1>Interactive Portfolio</h1>
    <section>
        <h2>INACAP Classes</h2>
        <hr/>
        <p>Class 1: Description</p>
        <p>Class 2: Description</p>
    </section>
    <section>
        <h2>DUOCUC Classes</h2>
        <hr/>
        <p>Class 1: Description</p>
        <p>Class 2: Description</p>
    </section>
</body>
</html>
